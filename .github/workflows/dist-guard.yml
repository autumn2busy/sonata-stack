name: dist-build-guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dist-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deterministic dist guard
        run: bash scripts/ci-dist-guard.sh
